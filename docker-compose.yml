version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: rafiq_db
    environment:
      POSTGRES_DB: rafiq
      POSTGRES_USER: rafiq_user
      POSTGRES_PASSWORD: rafiq_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rafiq_user -d rafiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rafiq_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
