version: '3.9'

# ================================================================
# RAFIQ EXECUTIVE ASSISTANT — Docker Compose
# بيئة التطوير الكاملة
# ================================================================

networks:
  rafiq_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  postgres_data:
  n8n_data:
  redis_data:

services:

  # ─────────────────────────────────────────
  # 🗄️  PostgreSQL — قاعدة البيانات
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rafiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rafiq_db}
      POSTGRES_USER: ${POSTGRES_USER:-rafiq_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5433:5432"
    networks:
      - rafiq_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rafiq_admin} -d ${POSTGRES_DB:-rafiq_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=200
        -c shared_buffers=256MB

  # ─────────────────────────────────────────
  # 🔴 Redis — Cache + WebSocket PubSub
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rafiq_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - rafiq_net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────
  # ⚡ FastAPI — الخلفية الذكية
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rafiq_backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-rafiq_db}
      POSTGRES_USER: ${POSTGRES_USER:-rafiq_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      API_SECRET_KEY: ${API_SECRET_KEY}
      CIB_API_BASE_URL: ${CIB_API_BASE_URL}
      CIB_API_KEY: ${CIB_API_KEY}
      CIB_SECRET_KEY: ${CIB_SECRET_KEY}
      CIB_MERCHANT_ID: ${CIB_MERCHANT_ID}
      CIB_WEBHOOK_SECRET: ${CIB_WEBHOOK_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      DEBUG: ${DEBUG:-true}
    ports:
      - "8000:8000"
    networks:
      - rafiq_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/assets:/app/assets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  # 🔄 n8n — محرك الأتمتة
  # ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: rafiq_n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-rafiq_db}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-rafiq_admin}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      N8N_LOG_LEVEL: info
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336  # 14 days
      GENERIC_TIMEZONE: Africa/Algiers
      TZ: Africa/Algiers
    ports:
      - "5678:5678"
    networks:
      - rafiq_net
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro

  # ─────────────────────────────────────────
  # 💎 Next.js — لوحة التحكم الفاخرة
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: rafiq_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    networks:
      - rafiq_net
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # ─────────────────────────────────────────
  # 🌐 Nginx — Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rafiq_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - rafiq_net
    depends_on:
      - backend
      - frontend
      - n8n
