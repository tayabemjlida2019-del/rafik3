name: Keep API Alive

on:
  schedule:
    # Ping every 10 minutes (GitHub Actions minimum is 5 min)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Endpoint
        run: |
          echo "Pinging Rafiq API..."
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://rafiq-api.onrender.com/api/v1/health)
          echo "Response status: $response"
          if [ "$response" = "200" ]; then
            echo "✅ API is alive!"
          else
            echo "⚠️ API returned status $response (may be waking up)"
          fi
