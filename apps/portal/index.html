<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرفيق — مركز التحكم</title>
    <meta name="description" content="لوحة التحكم الرئيسية لمنصة الرفيق السياحية - إدارة وتشغيل جميع الأنظمة">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="dashboard">
        <header>
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="18" stroke="url(#grad)" stroke-width="3" fill="none"/>
                        <path d="M14 20 L20 14 L26 20 L20 26Z" fill="url(#grad)"/>
                        <defs>
                            <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#60a5fa"/>
                                <stop offset="100%" stop-color="#a78bfa"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text">الرفيق</div>
            </div>
            <h1>مركز التحكم بالمنصة</h1>
            <p class="subtitle">إدارة وتشغيل جميع الأنظمة من مكان واحد</p>
        </header>

        <div class="status-grid">
            <div class="status-card" id="card-docker">
                <div class="card-glow"></div>
                <div class="icon">🐳</div>
                <h3>Docker</h3>
                <div class="state" id="state-docker">
                    <span class="pulse"></span>
                    <span class="state-text">جاري الفحص...</span>
                </div>
            </div>
            <div class="status-card" id="card-db">
                <div class="card-glow"></div>
                <div class="icon">🗄️</div>
                <h3>قاعدة البيانات</h3>
                <div class="state" id="state-db">
                    <span class="pulse"></span>
                    <span class="state-text">جاري الفحص...</span>
                </div>
            </div>
            <div class="status-card" id="card-api">
                <div class="card-glow"></div>
                <div class="icon">⚙️</div>
                <h3>الخلفية (API)</h3>
                <div class="state" id="state-api">
                    <span class="pulse"></span>
                    <span class="state-text">جاري الفحص...</span>
                </div>
            </div>
            <div class="status-card" id="card-web">
                <div class="card-glow"></div>
                <div class="icon">🌐</div>
                <h3>الواجهة (Web)</h3>
                <div class="state" id="state-web">
                    <span class="pulse"></span>
                    <span class="state-text">جاري الفحص...</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-start" class="btn btn-primary">
                <span class="btn-icon">▶</span>
                <span class="btn-label">تشغيل المنصة</span>
            </button>
            <button id="btn-stop" class="btn btn-danger">
                <span class="btn-icon">■</span>
                <span class="btn-label">إيقاف الأنظمة</span>
            </button>
        </div>

        <div class="quick-links">
            <a href="http://localhost:3005" target="_blank" class="link-card" id="link-web">
                <span class="link-icon">🌍</span>
                <span>فتح الموقع</span>
                <span class="link-arrow">←</span>
            </a>
            <a href="http://localhost:3001/api/docs" target="_blank" class="link-card" id="link-api">
                <span class="link-icon">📖</span>
                <span>وثائق API</span>
                <span class="link-arrow">←</span>
            </a>
        </div>

        <div class="log-panel" id="log-panel">
            <div class="log-header">
                <div class="log-title">
                    <span class="log-dot"></span>
                    السجلات الحية
                </div>
                <button class="log-clear" id="btn-clear-logs" title="مسح السجلات">🗑️</button>
            </div>
            <div class="log-content" id="logs"></div>
        </div>

        <footer>
            <p>منصة الرفيق السياحية &copy; 2026 — جميع الحقوق محفوظة</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>

</html>
