# ==========================================
# Render Blueprint — Al-Rafiq Platform
# ==========================================

services:
  # API Web Service
  - type: web
    name: rafiq-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: rafiq-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: rafiq-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: rafiq-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        value: https://rafk.netlify.app
      - key: PLATFORM_NAME
        value: الرفيق
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: rafiq-db
    plan: free
    databaseName: rafiq
    user: rafiq_user

  - name: rafiq-redis
    type: redis
    plan: free

  # Cron job to keep API alive (prevents free tier sleep)
  - type: cron
    name: rafiq-keep-alive
    runtime: node
    plan: free
    schedule: "*/10 * * * *"
    buildCommand: "echo 'ready'"
    startCommand: "node -e \"require('https').get('https://rafiq-api.onrender.com/api/v1/health', r => console.log('Ping OK:', r.statusCode)).on('error', e => console.error('Ping failed:', e.message))\""
